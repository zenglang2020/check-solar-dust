<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Module Dust Bill Statement</title>
<style>
  *{box-sizing:border-box;font-family:'Segoe UI',Roboto,sans-serif}
  body{background:#f4f6f8;padding:20px 0;margin:0}
  .container{max-width:750px;margin:0 auto}
  .bill-box{
    background:white;
    border:1px solid #ddd;
    border-radius:12px;
    padding:36px 40px;
    position:relative;
    box-shadow:0 4px 20px rgba(0,0,0,0.05);
    overflow:hidden;
  }
  .logo{
    text-align:center;
    margin-bottom:20px;
    width:100%;
    max-width:300px;
    margin-left:auto;
    margin-right:auto;
  }
  .logo img{
    width:100%;
    height:auto;
    object-fit:contain;
    background:#f8f8f8;
    padding:10px;
    border-radius:8px;
  }
  .bill-title{
    font-size:24px;
    font-weight:700;
    text-align:center;
    margin-bottom:6px;
    color:#111;
  }
  .bill-subtitle{
    text-align:center;font-size:14px;color:#666;margin-bottom:30px}
  .form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 20px;
    margin-bottom:24px;
  }
  .form-item{display:flex;flex-direction:column;gap:6px}
  .form-label{font-size:13px;font-weight:500;color:#333}
  .form-input{
    padding:10px 12px;
    border:1px solid #ccc;
    border-radius:6px;
    font-size:14px;
    direction:ltr;
    text-align:left;
  }
  .calc-btn{
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    padding:14px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    width:100%;
    margin:20px 0;
    transition:background 0.3s ease;
  }
  .calc-btn:hover{background:#00254a}
  .result-bill{
    margin-top:30px;
    padding:24px;
    border:1px solid #c5d3e2;
    border-radius:10px;
    background:#fcfdff;
    display:none;
    position:relative;
    min-height:180px;
  }
  .result-title{
    font-size:16px;
    font-weight:600;
    margin-bottom:16px;
    color:#222;
  }
  .bill-row{
    display:flex;
    justify-content:space-between;
    padding:8px 0;
    font-size:14px;
  }
  .bill-row.total{
    border-top:1px solid #999;
    margin-top:10px;
    padding-top:14px;
    font-size:16px;
    font-weight:700;
    color:#003366;
  }
  .bill-hl{font-weight:600;color:#003366}
  .stamp{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%) scale(0);
    width:120px;
    height:120px;
    border:4px solid #d10e0e;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:14px;
    font-weight:bold;
    color:#d10e0e;
    text-align:center;
    line-height:1.3;
    opacity:0;
    z-index:1;
    background:rgba(255,255,255,0.8);
  }
  @keyframes stampAnim{
    0%{transform:translate(-50%, -50%) scale(0);opacity:0}
    60%{transform:translate(-50%, -50%) scale(1.2);opacity:1}
    100%{transform:translate(-50%, -50%) scale(1);opacity:1}
  }
  .stamp.show{animation:stampAnim 1.2s ease forwards}
  .loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media(max-width:575px){
    .form-grid{grid-template-columns:1fr}
    .bill-box{padding:24px 20px}
    .stamp{width:100px;height:100px;font-size:12px}
    .bill-title{font-size:20px}
  }
</style>
</head>
<body>
<div class="container">
<div class="bill-box">
  <div class="logo">
    <img src="https://p11-flow-imagex-download-sign.byteimg.com/tos-cn-i-a9rns2rl98/7aa4d360a0d64c3a9f6d6d7d566254be.png~tplv-a9rns2rl98-24:720:720.png?lk3s=8e244e95&rcl=20260330174509DC45CD7E3E12CCB78D76&rrcfp=8a172a1a&x-expires=1775468709&x-signature=3fg%2FtEvQrIRt6q4p6HO46nfHlSw%3D" alt="LONGi Solar Logo" onerror="this.src='https://via.placeholder.com/300x100?text=LONGi+Solar';">
  </div>
  <div class="bill-title">Check Your Module Dust Bill</div>
  <div class="bill-subtitle">Calculation Results are for preliminary reference only.</div>
  <div class="form-grid">
    <div class="form-item">
      <label class="form-label">Your City</label>
      <select class="form-input" id="city">
        <option value="HoChiMinhCity">Ho Chi Minh City</option>
        <option value="Hanoi">Hanoi</option>
        <option value="Haiphong">Haiphong</option>
        <option value="DaNang">Da Nang</option>
        <option value="CanTho">Can Tho</option>
        <option value="VungTau">Vung Tau</option>
        <option value="NhaTrang">Nha Trang</option>
        <option value="Hue">Hue</option>
        <option value="ThanhHoa">Thanh Hoa</option>
        <option value="Vinh">Vinh</option>
        <option value="ThaiNguyen">Thai Nguyen</option>
        <option value="BacNinh">Bac Ninh</option>

        <option value="Bangkok">Bangkok</option>
        <option value="Chonburi">Chonburi</option>
        <option value="Rayong">Rayong</option>
        <option value="Chachoengsao">Chachoengsao</option>
        <option value="Ayutthaya">Ayutthaya</option>
        <option value="PrachinBuri">Prachin Buri</option>
        <option value="SamutSakhon">Samut Sakhon</option>
        <option value="Saraburi">Saraburi</option>
        <option value="SamutPrakan">Samut Prakan</option>
        <option value="NakhonPathom">Nakhon Pathom</option>
        <option value="ChiangMai">Chiang Mai</option>

        <option value="QuezonCity">Quezon City</option>
        <option value="MakatiCity">Makati City</option>
        <option value="ManilaCity">Manila City</option>
        <option value="TaguigCity">Taguig City</option>
        <option value="DavaoCity">Davao City</option>

        <option value="PhnomPenh">Phnom Penh</option>
        <option value="Sihanoukville">Sihanoukville</option>
        <option value="Battambang">Battambang</option>
        <option value="SiemReap">Siem Reap</option>
        <option value="KampongCham">Kampong Cham</option>

        <option value="Vientiane">Vientiane</option>
        <option value="Savannakhet">Savannakhet</option>
        <option value="Pakse">Pakse</option>
        <option value="LuangPrabang">Luang Prabang</option>
        <option value="Thakhek">Thakhek</option>

        <option value="Yangon">Yangon</option>
        <option value="Mandalay">Mandalay</option>
        <option value="Naypyidaw">Naypyidaw</option>
        <option value="Mawlamyine">Mawlamyine</option>
        <option value="Bago">Bago</option>
      </select>
    </div>
    <div class="form-item">
      <label class="form-label">Avg Humidity (%)</label>
      <input type="number" class="form-input" id="humidity" readonly>
    </div>
    <div class="form-item">
      <label class="form-label">PM10 Annual (μg/m³)</label>
      <input type="number" class="form-input" id="pm10" readonly>
    </div>
    <div class="form-item">
      <label class="form-label">Vegetation Coverage (%)</label>
      <input type="number" class="form-input" id="vegetation" readonly>
    </div>
    <div class="form-item">
      <label class="form-label">Roof Area (m²)</label>
      <input type="number" class="form-input" id="area" value="100" min="1">
    </div>
    <div class="form-item">
      <label class="form-label">Roof Tilt Angle (0-60°)</label>
      <input type="number" class="form-input" id="tilt" value="20" min="0" max="60">
    </div>
    <div class="form-item">
      <label class="form-label">Cleaning Times/Year</label>
      <input type="number" class="form-input" id="cleanTimes" value="4" min="0">
    </div>
    <div class="form-item">
      <label class="form-label">Cost per Cleaning (THB)</label>
      <input type="number" class="form-input" id="cleanCost" value="5000" min="0">
    </div>
    <div class="form-item">
      <label class="form-label">Dusty Days/Year (1-365)</label>
      <input type="number" class="form-input" id="dustyDays" value="50" min="1" max="365">
    </div>
    <div class="form-item">
      <label class="form-label">Electricity Price (THB/kWh)</label>
      <input type="number" class="form-input" id="price" value="5" min="0" step="0.01">
    </div>
  </div>
  <button class="calc-btn" onclick="calculateBill()" id="calcBtn">CHECK DUST BILL</button>
  <div class="result-bill" id="resultBill">
    <div class="stamp" id="stamp">Dust Report Approved</div>
    <div class="result-title">Annual Dust Bill Calculation</div>
    <div class="bill-row">
      <span>Total power loss rate</span>
      <span class="bill-hl" id="lossRateText"></span>
    </div>
    <div class="bill-row">
      <span>Total cleaning cost per year</span>
      <span class="bill-hl" id="cleanTotal"></span>
    </div>
    <div class="bill-row">
      <span>Annual power generation loss</span>
      <span class="bill-hl" id="powerLoss"></span>
    </div>
    <div class="bill-row total">
      <span>YEARLY DUST BILL</span>
      <span id="totalBill"></span>
    </div>
  </div>
</div>
</div>
<script>
const cityData = {
  HoChiMinhCity:      { h:76, pm:45, veg:24 },
  Hanoi:              { h:78, pm:46, veg:47 },
  Haiphong:           { h:79, pm:42, veg:35 },
  DaNang:             { h:80, pm:38, veg:39 },
  CanTho:             { h:81, pm:41, veg:32 },
  VungTau:            { h:82, pm:34, veg:43 },
  NhaTrang:           { h:82, pm:33, veg:42 },
  Hue:                { h:79, pm:40, veg:37 },
  ThanhHoa:           { h:77, pm:44, veg:38 },
  Vinh:               { h:76, pm:45, veg:36 },
  ThaiNguyen:         { h:75, pm:48, veg:41 },
  BacNinh:            { h:77, pm:43, veg:34 },

  Bangkok:            { h:74, pm:47, veg:28 },
  Chonburi:           { h:77, pm:40, veg:33 },
  Rayong:             { h:78, pm:36, veg:45 },
  Chachoengsao:       { h:76, pm:41, veg:31 },
  Ayutthaya:          { h:75, pm:44, veg:35 },
  PrachinBuri:        { h:75, pm:42, veg:38 },
  SamutSakhon:        { h:76, pm:43, veg:29 },
  Saraburi:           { h:74, pm:46, veg:32 },
  SamutPrakan:        { h:75, pm:45, veg:27 },
  NakhonPathom:       { h:74, pm:44, veg:34 },
  ChiangMai:          { h:73, pm:58, veg:31 },

  QuezonCity:         { h:78, pm:46, veg:31 },
  MakatiCity:         { h:77, pm:44, veg:26 },
  ManilaCity:         { h:77, pm:52, veg:23 },
  TaguigCity:         { h:78, pm:42, veg:29 },
  DavaoCity:          { h:80, pm:39, veg:40 },

  PhnomPenh:          { h:79, pm:48, veg:21 },
  Sihanoukville:      { h:81, pm:37, veg:46 },
  Battambang:         { h:76, pm:43, veg:33 },
  SiemReap:           { h:75, pm:41, veg:38 },
  KampongCham:        { h:77, pm:42, veg:35 },

  Vientiane:          { h:75, pm:42, veg:23 },
  Savannakhet:        { h:74, pm:44, veg:31 },
  Pakse:              { h:76, pm:40, veg:37 },
  LuangPrabang:       { h:73, pm:38, veg:42 },
  Thakhek:            { h:74, pm:41, veg:35 },

  Yangon:             { h:79, pm:51, veg:25 },
  Mandalay:           { h:72, pm:56, veg:28 },
  Naypyidaw:          { h:75, pm:43, veg:47 },
  Mawlamyine:         { h:78, pm:44, veg:39 },
  Bago:               { h:76, pm:46, veg:34 }
};

document.getElementById('city').addEventListener('change', function(){
  const c = this.value;
  const d = cityData[c];
  if(d) {
    document.getElementById('humidity').value = d.h;
    document.getElementById('pm10').value = d.pm;
    document.getElementById('vegetation').value = d.veg;
  }
});
window.onload = function(){
  try {
    document.getElementById('city').dispatchEvent(new Event('change'));
  } catch (e) {
    console.log('Initialization data:', e);
  }
}
function fmtTHB(v){
  try {
    return v.toLocaleString('th-TH', {minimumFractionDigits:2,maximumFractionDigits:2}) + ' THB';
  } catch {
    return v.toLocaleString('en-US', {minimumFractionDigits:2,maximumFractionDigits:2}) + ' THB';
  }
}
function getTotalLossRate(H, PM, VEG, tilt, dusty){
  let hLoss = 0;
  if(H < 40) hLoss = 0.02;
  else if(H >= 40 && H < 70) hLoss = 0.05;
  else if(H >= 70) hLoss = 0.07;
  let pmLoss = 0;
  if(PM >= 40 && PM < 70) pmLoss = 0.03;
  else if(PM >= 70) pmLoss = 0.05;
  let vLoss = 0;
  if(VEG >= 30 && VEG <= 45) vLoss = 0.01;
  else if(VEG < 30) vLoss = 0.03;
  let envLoss = hLoss * 0.8 + pmLoss * 1.0 + vLoss * 0.6;
  let tiltAdd = 0;
  if(tilt >= 0 && tilt <= 20) tiltAdd = 0.02;
  else if(tilt > 20 && tilt <= 40) tiltAdd = 0.01;
  let dustyAdd = 0;
  if(dusty <= 60) dustyAdd = 0.01;
  else if(dusty <= 200) dustyAdd = 0.02;
  else dustyAdd = 0.03;
  const totalLoss = envLoss + tiltAdd + dustyAdd;
  return totalLoss;
}
function calculateBill(){
  const btn = document.getElementById('calcBtn');
  const btnText = btn.innerHTML;
  
  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>CHECKING...';
  try {
    const area    = Number(document.getElementById('area').value) || 0;
    const tilt    = Number(document.getElementById('tilt').value) || 20;
    const cleanT  = Number(document.getElementById('cleanTimes').value) || 0;
    const cleanC  = Number(document.getElementById('cleanCost').value) || 0;
    const dusty   = Number(document.getElementById('dustyDays').value) || 0;
    const price   = Number(document.getElementById('price').value) || 0;
    const H       = Number(document.getElementById('humidity').value) || 0;
    const PM      = Number(document.getElementById('pm10').value) || 0;
    const VEG     = Number(document.getElementById('vegetation').value) || 0;
    if(area <= 0) throw new Error('Roof area must be greater than 0 m²');
    if(price <= 0) throw new Error('Electricity price must be greater than 0 THB/kWh');
    const totalClean = cleanT * cleanC;
    const lossRate = getTotalLossRate(H,PM,VEG,tilt,dusty);
    const lossText = (lossRate*100).toFixed(2)+'%';
    const kW = area * 0.15;
    const annualGen = kW * 1150;
    const powerLoss = annualGen * lossRate * price;
    const total = totalClean + powerLoss;
    document.getElementById('lossRateText').innerText = lossText;
    document.getElementById('cleanTotal').innerText  = fmtTHB(totalClean);
    document.getElementById('powerLoss').innerText   = fmtTHB(powerLoss);
    document.getElementById('totalBill').innerText   = fmtTHB(total);
    const bill = document.getElementById('resultBill');
    const stamp = document.getElementById('stamp');
    bill.style.display = 'block';
    stamp.classList.remove('show');
    setTimeout(()=>stamp.classList.add('show'),100);
  } catch (error) {
    alert('Error: ' + error.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = btnText;
  }
}
</script>
</body>
</html>
